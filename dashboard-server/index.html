<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Joel Kundu Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #1d1d1f;
        }

        .login-container p {
            color: #86868b;
            margin-bottom: 2rem;
        }

        .login-form input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #d2d2d7;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #0071e3;
        }

        .login-form button {
            width: 100%;
            padding: 1rem;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-form button:hover {
            background: #005bb5;
        }

        .error-message {
            color: #ff3b30;
            margin-top: 1rem;
            display: none;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            min-height: 100vh;
        }

        .dashboard-container.active {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #d2d2d7;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 0.25rem;
        }

        .sidebar-header p {
            font-size: 0.875rem;
            color: #86868b;
        }

        .nav-menu {
            list-style: none;
            margin-top: 2rem;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            color: #1d1d1f;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            background: #f5f5f7;
        }

        .nav-link.active {
            background: #0071e3;
            color: #ffffff;
        }

        .nav-link svg {
            width: 20px;
            height: 20px;
            margin-right: 0.75rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem 3rem;
        }

        .content-header {
            margin-bottom: 2rem;
        }

        .content-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #1d1d1f;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #1d1d1f;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d2d2d7;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0071e3;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: #0071e3;
            color: white;
        }

        .btn-primary:hover {
            background: #005bb5;
        }

        .btn-secondary {
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: #e8e8ed;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: #d2d2d7;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #0071e3;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(22px);
        }

        /* Laurel bubbles */
        .laurel-bubbles {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 20px;
            min-height: 200px;
            background: #f5f5f7;
            border-radius: 8px;
        }

        .laurel-bubble {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #C4A35A;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .laurel-bubble:hover {
            transform: scale(1.1);
        }

        .laurel-bubble img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background: #f5f5f7;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 0.5rem;
        }

        .stat-text {
            font-size: 0.875rem;
            color: #86868b;
        }

        /* Services list */
        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: #f5f5f7;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .service-info {
            flex: 1;
        }

        .service-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .service-description {
            font-size: 0.875rem;
            color: #86868b;
        }

        .service-actions {
            display: flex;
            gap: 0.5rem;
            margin-left: 1rem;
        }

        /* Projects table */
        .projects-table {
            width: 100%;
            border-collapse: collapse;
        }

        .projects-table th,
        .projects-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #d2d2d7;
        }

        .projects-table th {
            font-weight: 600;
            color: #1d1d1f;
            background: #f5f5f7;
        }

        .projects-table tr:hover {
            background: #f9f9fb;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-visible {
            background: #d4edda;
            color: #155724;
        }

        .status-hidden {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <h1>Dashboard</h1>
            <p>Enter password to access</p>
            <form class="login-form" id="loginForm">
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <p class="error-message" id="loginError">Invalid password</p>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-container" id="dashboardContainer">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Dashboard</h1>
                <p>Joel Kundu Portfolio</p>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a class="nav-link active" data-section="hero">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Hero Section
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="about">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        About Me
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="works">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 7a2 2 0 002 2v4m6-4a2 2 0 012-2h4M5 7a2 2 0 012-2h4m6 0a2 2 0 012 2"></path></svg>
                        Selected Works
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="showreel">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Showreel
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="gallery">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        Gallery
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="services">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.755M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Services
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="contact">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                        Contact
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-section="footer">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        Footer
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <h2 id="sectionTitle">Hero Section</h2>
            </div>

            <!-- Hero Section Content -->
            <div id="heroSection" class="section-content">
                <div class="card">
                    <h3>Basic Information</h3>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="heroName" value="Joel Kundu">
                    </div>
                    <div class="form-group">
                        <label>Tagline</label>
                        <input type="text" id="heroTagline" value="Cinematographer & Director">
                    </div>
                </div>

                <div class="card">
                    <h3>Laurels</h3>
                    <div class="laurel-bubbles" id="laurelBubbles">
                        <!-- Laurel bubbles will be added here -->
                    </div>
                    <div style="margin-top: 1rem;">
                        <button class="btn btn-primary" onclick="addLaurel()">Add Laurel</button>
                    </div>
                </div>
            </div>

            <!-- About Section Content -->
            <div id="aboutSection" class="section-content" style="display: none;">
                <div class="card">
                    <h3>About Me</h3>
                    <div class="form-group">
                        <label>Header</label>
                        <input type="text" id="aboutHeader" value="About Me">
                    </div>
                    <div class="form-group">
                        <label>Tagline</label>
                        <input type="text" id="aboutTagline" value="Visual storyteller behind the lens">
                    </div>
                    <div class="form-group">
                        <label>Paragraph</label>
                        <textarea id="aboutParagraph"></textarea>
                    </div>
                </div>

                <div class="card">
                    <h3>Stats</h3>
                    <div class="stats-grid" id="statsGrid">
                        <!-- Stats will be added here -->
                    </div>
                </div>
            </div>

            <!-- More sections will be added here -->
        </main>
    </div>

    <script>
        let authToken = localStorage.getItem('dashboardToken');
        let siteConfig = {};

        // Check if already logged in
        if (authToken) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardContainer').classList.add('active');
            loadConfig();
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('dashboardToken', data.token);
                    authToken = data.token;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboardContainer').classList.add('active');
                    loadConfig();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('loginError').style.display = 'block';
            }
        });

        // Load config
        async function loadConfig() {
            try {
                const response = await fetch('/api/config', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                siteConfig = await response.json();
                populateForms();
            } catch (error) {
                console.error('Error loading config:', error);
            }
        }

        // Populate forms with config data
        function populateForms() {
            // Hero
            if (siteConfig.hero) {
                document.getElementById('heroName').value = siteConfig.hero.name || '';
                document.getElementById('heroTagline').value = siteConfig.hero.tagline || '';
            }
            
            // About
            if (siteConfig.about) {
                document.getElementById('aboutHeader').value = siteConfig.about.header || '';
                document.getElementById('aboutTagline').value = siteConfig.about.tagline || '';
                document.getElementById('aboutParagraph').value = siteConfig.about.paragraph || '';
            }
        }

        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.dataset.section;
                
                // Update active nav
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                
                // Update title
                document.getElementById('sectionTitle').textContent = link.textContent.trim();
                
                // Show section
                document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none');
                document.getElementById(`${section}Section`).style.display = 'block';
            });
        });

        // Add laurel
        function addLaurel() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    try {
                        const response = await fetch('/api/upload', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${authToken}` },
                            body: formData
                        });
                        const data = await response.json();
                        if (data.success) {
                            // Add to laurels
                            renderLaurels();
                        }
                    } catch (error) {
                        console.error('Upload error:', error);
                    }
                }
            };
            input.click();
        }

        function renderLaurels() {
            // Render laurel bubbles
        }
    </script>
</body>
</html>
