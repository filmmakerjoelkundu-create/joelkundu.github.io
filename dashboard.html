<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Joel Kundu</title>
    <link rel="icon" type="image/jpeg" href="assets/logos/Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --color-bg-primary: #f5f5f7;
            --color-bg-secondary: #ffffff;
            --color-bg-tertiary: #e8e8ed;
            --color-text-primary: #1d1d1f;
            --color-text-secondary: #86868b;
            --color-accent: #0071e3;
            --color-accent-hover: #0077ed;
            --color-border: #d2d2d7;
            --color-success: #34c759;
            --color-warning: #ff9500;
            --color-error: #ff3b30;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg-primary: #1d1d1f;
                --color-bg-secondary: #2c2c2e;
                --color-bg-tertiary: #3a3a3c;
                --color-text-primary: #f5f5f7;
                --color-text-secondary: #86868b;
                --color-border: #48484a;
            }
        }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dashboard-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .dashboard-header p {
            color: var(--color-text-secondary);
            font-size: 1rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--color-accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--color-accent-hover);
        }
        
        .btn-secondary {
            background: var(--color-bg-tertiary);
            color: var(--color-text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--color-border);
        }
        
        .btn-danger {
            background: var(--color-error);
            color: white;
        }
        
        .btn-danger:hover {
            background: #d63030;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--color-bg-secondary);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }
        
        .stat-card h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
        }
        
        .stat-card p {
            color: var(--color-text-secondary);
            font-size: 0.875rem;
        }
        
        .projects-section {
            margin-bottom: 2rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .project-card {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        
        .project-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .project-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--color-bg-tertiary);
        }
        
        .project-content {
            padding: 1.5rem;
        }
        
        .project-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .project-role {
            color: var(--color-accent);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
        }
        
        .project-synopsis {
            color: var(--color-text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .project-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--color-text-secondary);
            margin-bottom: 1rem;
        }
        
        .project-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .project-actions .btn {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.75rem;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--color-bg-secondary);
            border-radius: var(--radius-lg);
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: 0.5rem;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: 0.875rem;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-accent);
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-text-secondary);
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 1rem;
            }
            
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1>Portfolio Dashboard</h1>
                <p>Manage your projects and portfolio content</p>
            </div>
            <div>
                <a href="index.html" class="btn btn-secondary">View Site</a>
                <button class="btn btn-primary" onclick="openAddProjectModal()">+ Add Project</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalProjects">0</h3>
                <p>Total Projects</p>
            </div>
            <div class="stat-card">
                <h3 id="totalStills">0</h3>
                <p>Total Stills</p>
            </div>
            <div class="stat-card">
                <h3 id="totalLaurels">0</h3>
                <p>Total Laurels</p>
            </div>
            <div class="stat-card">
                <h3 id="lastUpdated">-</h3>
                <p>Last Updated</p>
            </div>
        </div>
        
        <div class="projects-section">
            <div class="section-header">
                <h2>All Projects</h2>
            </div>
            
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be loaded here -->
            </div>
        </div>
    </div>
    
    <!-- Add/Edit Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Project</h2>
                <button class="modal-close" onclick="closeProjectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    
                    <div class="form-group">
                        <label for="projectTitle">Project Title *</label>
                        <input type="text" id="projectTitle" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectRole">Your Role *</label>
                        <input type="text" id="projectRole" required placeholder="e.g., Director of Photography">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectSynopsis">Synopsis</label>
                        <textarea id="projectSynopsis" placeholder="Brief description of the project"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectCategory">Category</label>
                        <select id="projectCategory">
                            <option value="narrative">Narrative</option>
                            <option value="documentary">Documentary</option>
                            <option value="commercial">Commercial</option>
                            <option value="music-video">Music Video</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectDirector">Director</label>
                        <input type="text" id="projectDirector" placeholder="Leave blank if not applicable">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectProducer">Producer</label>
                        <input type="text" id="projectProducer" placeholder="Leave blank if not applicable">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectCinematographer">Cinematographer</label>
                        <input type="text" id="projectCinematographer" placeholder="Leave blank if not applicable">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectEditor">Editor</label>
                        <input type="text" id="projectEditor" placeholder="Leave blank if not applicable">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectLocation">Shooting Location</label>
                        <input type="text" id="projectLocation" placeholder="Leave blank if not applicable">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectDuration">Duration</label>
                        <input type="text" id="projectDuration" placeholder="e.g., 18 minutes">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectYear">Year</label>
                        <input type="number" id="projectYear" placeholder="e.g., 2024">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectPoster">Poster Image URL</label>
                        <input type="text" id="projectPoster" placeholder="assets/images/...">
                    </div>
                    
                    <div class="form-group">
                        <label for="projectStills">Stills (comma-separated URLs)</label>
                        <textarea id="projectStills" placeholder="assets/images/img1.png, assets/images/img2.png"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectBTS">Behind the Scenes (comma-separated URLs)</label>
                        <textarea id="projectBTS" placeholder="assets/images/bts1.png, assets/images/bts2.png"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="projectLaurels">Laurels & Awards (one per line)</label>
                        <textarea id="projectLaurels" placeholder="Official Selection - Festival Name&#10;Best Cinematography - Award Name"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeProjectModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // Project data (in production, this would come from a database)
        let projects = {
            'e13m': {
                id: 'e13m',
                title: 'E13M',
                role: 'Director of Photography',
                synopsis: 'A father\'s self-erasure as an act of love',
                category: 'narrative',
                director: 'Joel Kundu',
                producer: 'Jane Smith',
                cinematographer: 'Joel Kundu',
                editor: 'Mike Johnson',
                location: 'London, Ontario',
                duration: '18 minutes',
                year: '2024',
                poster: 'assets/images/Screenshot (15).png',
                stills: [
                    'assets/images/Screenshot (15).png',
                    'assets/images/Screenshot (16).png',
                    'assets/images/Screenshot (17).png',
                    'assets/images/Screenshot (18).png',
                    'assets/images/Screenshot (19).png',
                    'assets/images/Screenshot (20).png'
                ],
                bts: [
                    'assets/images/Screenshot (11).png',
                    'assets/images/Screenshot (12).png',
                    'assets/images/Screenshot (13).png',
                    'assets/images/Screenshot (14).png'
                ],
                laurels: [
                    'Official Selection - Toronto Film Festival',
                    'Best Cinematography - London Film Fest',
                    'Audience Award - Short Film Showcase'
                ]
            },
            'short2': {
                id: 'short2',
                title: 'Untitled Short',
                role: 'Director',
                synopsis: 'Coming soon',
                category: 'narrative',
                director: 'Joel Kundu',
                producer: 'TBD',
                cinematographer: 'TBD',
                editor: 'TBD',
                location: 'TBD',
                duration: 'TBD',
                year: '2025',
                poster: 'assets/images/Screenshot (16).png',
                stills: [
                    'assets/images/Screenshot (16).png',
                    'assets/images/Screenshot (17).png',
                    'assets/images/Screenshot (18).png'
                ],
                bts: [],
                laurels: []
            },
            'doc1': {
                id: 'doc1',
                title: 'Documentary Project',
                role: 'Cinematographer',
                synopsis: 'In development',
                category: 'documentary',
                director: 'TBD',
                producer: 'TBD',
                cinematographer: 'Joel Kundu',
                editor: 'TBD',
                location: 'TBD',
                duration: 'TBD',
                year: '2025',
                poster: 'assets/images/Screenshot (17).png',
                stills: [
                    'assets/images/Screenshot (17).png',
                    'assets/images/Screenshot (18).png',
                    'assets/images/Screenshot (19).png'
                ],
                bts: [],
                laurels: []
            },
            'commercial1': {
                id: 'commercial1',
                title: 'Commercial',
                role: 'DP/Director',
                synopsis: 'Brand storytelling',
                category: 'commercial',
                director: 'Joel Kundu',
                producer: 'Brand Team',
                cinematographer: 'Joel Kundu',
                editor: 'Post House',
                location: 'Toronto',
                duration: '30 seconds',
                year: '2024',
                poster: 'assets/images/Screenshot (18).png',
                stills: [
                    'assets/images/Screenshot (18).png',
                    'assets/images/Screenshot (19).png',
                    'assets/images/Screenshot (20).png'
                ],
                bts: [],
                laurels: []
            }
        };
        
        // Load projects on page load
        function loadProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';
            
            const projectIds = Object.keys(projects);
            
            if (projectIds.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <h3>No projects yet</h3>
                        <p>Click "Add Project" to create your first project</p>
                    </div>
                `;
                return;
            }
            
            projectIds.forEach(id => {
                const project = projects[id];
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.poster}" alt="${project.title}" class="project-image">
                    <div class="project-content">
                        <h3 class="project-title">${project.title}</h3>
                        <p class="project-role">${project.role}</p>
                        <p class="project-synopsis">${project.synopsis}</p>
                        <div class="project-meta">
                            <span>${project.year || 'TBD'}</span>
                            <span>${project.duration || 'TBD'}</span>
                            <span>${project.stills?.length || 0} stills</span>
                        </div>
                        <div class="project-actions">
                            <button class="btn btn-secondary" onclick="editProject('${id}')">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProject('${id}')">Delete</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            updateStats();
        }
        
        // Update statistics
        function updateStats() {
            const projectIds = Object.keys(projects);
            let totalStills = 0;
            let totalLaurels = 0;
            
            projectIds.forEach(id => {
                const project = projects[id];
                totalStills += project.stills?.length || 0;
                totalLaurels += project.laurels?.length || 0;
            });
            
            document.getElementById('totalProjects').textContent = projectIds.length;
            document.getElementById('totalStills').textContent = totalStills;
            document.getElementById('totalLaurels').textContent = totalLaurels;
            document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString();
        }
        
        // Open add project modal
        function openAddProjectModal() {
            document.getElementById('modalTitle').textContent = 'Add New Project';
            document.getElementById('projectForm').reset();
            document.getElementById('projectId').value = '';
            document.getElementById('projectModal').classList.add('active');
        }
        
        // Edit project
        function editProject(id) {
            const project = projects[id];
            if (!project) return;
            
            document.getElementById('modalTitle').textContent = 'Edit Project';
            document.getElementById('projectId').value = id;
            document.getElementById('projectTitle').value = project.title;
            document.getElementById('projectRole').value = project.role;
            document.getElementById('projectSynopsis').value = project.synopsis;
            document.getElementById('projectCategory').value = project.category;
            document.getElementById('projectDirector').value = project.director || '';
            document.getElementById('projectProducer').value = project.producer || '';
            document.getElementById('projectCinematographer').value = project.cinematographer || '';
            document.getElementById('projectEditor').value = project.editor || '';
            document.getElementById('projectLocation').value = project.location || '';
            document.getElementById('projectDuration').value = project.duration || '';
            document.getElementById('projectYear').value = project.year || '';
            document.getElementById('projectPoster').value = project.poster || '';
            document.getElementById('projectStills').value = project.stills?.join(', ') || '';
            document.getElementById('projectBTS').value = project.bts?.join(', ') || '';
            document.getElementById('projectLaurels').value = project.laurels?.join('\n') || '';
            
            document.getElementById('projectModal').classList.add('active');
        }
        
        // Close modal
        function closeProjectModal() {
            document.getElementById('projectModal').classList.remove('active');
        }
        
        // Delete project
        function deleteProject(id) {
            if (confirm('Are you sure you want to delete this project?')) {
                delete projects[id];
                loadProjects();
            }
        }
        
        // Form submission
        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const id = document.getElementById('projectId').value || 'project_' + Date.now();
            
            projects[id] = {
                id: id,
                title: document.getElementById('projectTitle').value,
                role: document.getElementById('projectRole').value,
                synopsis: document.getElementById('projectSynopsis').value,
                category: document.getElementById('projectCategory').value,
                director: document.getElementById('projectDirector').value || null,
                producer: document.getElementById('projectProducer').value || null,
                cinematographer: document.getElementById('projectCinematographer').value || null,
                editor: document.getElementById('projectEditor').value || null,
                location: document.getElementById('projectLocation').value || null,
                duration: document.getElementById('projectDuration').value || null,
                year: document.getElementById('projectYear').value || null,
                poster: document.getElementById('projectPoster').value || 'assets/images/placeholder.png',
                stills: document.getElementById('projectStills').value.split(',').map(s => s.trim()).filter(s => s),
                bts: document.getElementById('projectBTS').value.split(',').map(s => s.trim()).filter(s => s),
                laurels: document.getElementById('projectLaurels').value.split('\n').map(s => s.trim()).filter(s => s)
            };
            
            closeProjectModal();
            loadProjects();
            
            alert('Project saved successfully!');
        });
        
        // Close modal on outside click
        document.getElementById('projectModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeProjectModal();
            }
        });
        
        // Initialize
        loadProjects();
    </script>
</body>
</html>
