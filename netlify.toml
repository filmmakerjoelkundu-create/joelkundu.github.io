[build]
  # No build command needed — this is a static site (HTML/CSS/JS only)
  # Setting command = "echo skip" avoids unnecessary build processing
  command = "echo skip"
  publish = "."

[identity]
  # Enable Netlify Identity for dashboard authentication
  # After deploying, go to Site settings > Identity > Enable
  # Then invite yourself as a user under Identity > Invite users

# Redirect dashboard root to index.html
[[redirects]]
  from = "/dashboard"
  to = "/dashboard/index.html"
  status = 200
